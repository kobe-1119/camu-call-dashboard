<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Call Analysis Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-card{background:#fff;border-radius:12px;padding:40px;width:360px;box-shadow:0 4px 24px rgba(0,0,0,.1)}
.login-card h1{font-size:20px;color:#1a1a2e;margin-bottom:4px}
.login-card .sub{font-size:12px;color:#94a3b8;margin-bottom:24px}
.login-card label{display:block;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.login-card input{width:100%;padding:10px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;margin-bottom:16px;transition:border-color .15s}
.login-card input:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.login-card button{width:100%;padding:10px;background:linear-gradient(135deg,#1a1a2e 0%,#2d3561 100%);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s}
.login-card button:hover{opacity:.9}
.login-card button:disabled{opacity:.5;cursor:default}
.error{background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;padding:8px 12px;border-radius:6px;font-size:12px;margin-bottom:16px;display:none}
.notice{background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;padding:8px 12px;border-radius:6px;font-size:11px;margin-bottom:16px;line-height:1.4}
</style>
</head>
<body>
<div class="login-card">
  <h1>Call Analysis Dashboard</h1>
  <div class="sub">Authorized access only</div>
  <div class="error" id="error"></div>
  <form onsubmit="handleLogin(event)">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter dashboard password" autofocus required>
    <button type="submit" id="loginBtn">Sign In</button>
  </form>
</div>
<script>
// If already authenticated, redirect to dashboard
if (localStorage.getItem('token')) {
  window.location.href = '/';
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('error');
  const password = document.getElementById('password').value;

  btn.disabled = true;
  btn.textContent = 'Signing in...';
  err.style.display = 'none';

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({password}),
    });

    if (res.ok) {
      const data = await res.json();
      localStorage.setItem('token', data.token);
      window.location.href = '/';
    } else {
      err.textContent = 'Invalid password. Please try again.';
      err.style.display = 'block';
    }
  } catch (e) {
    err.textContent = 'Connection error. Please try again.';
    err.style.display = 'block';
  }

  btn.disabled = false;
  btn.textContent = 'Sign In';
}
</script>
</body>
</html>
